model:
  arch: pretrain
  load_finetuned: False

  pretrained: "https://storage.googleapis.com/sfr-vision-language-research/LAVIS/models/BLIP2/stage1_pt_640_hug_mqtr.pth"

  # vit encoder
  vit_model: "siglip-base-512"
  image_size: 800
  drop_path_rate: 0.0
  use_grad_checkpoint: False
  vit_precision: float
  freeze_vit: False
  max_txt_len: 32
  vision_width: 1024
  loss_itc_weight: 1
  cross_attention_freq: 2
  agg_method: 'hug_cross'

  # Q-Former
  num_query_token: 64


preprocess:
    vis_processor:
        train:
          name: "blip2_image_train"
          image_size: 800

        eval:
          name: "blip_image_eval"
          image_size: 800
    text_processor:
        train:
          name: "blip_caption"
        eval:
          name: "blip_caption"
